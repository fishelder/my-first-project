<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人介绍</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f5f7fa;
            color: #333;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        .card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
            max-width: 560px;
            width: 100%;
            padding: 3rem;
            text-align: center;
        }

        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            margin: 0 auto 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            color: #fff;
            font-weight: 700;
        }

        h1 {
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 0.25rem;
            color: #1a1a2e;
        }

        .tagline {
            color: #888;
            font-size: 0.95rem;
            margin-bottom: 1.5rem;
        }

        .divider {
            width: 40px;
            height: 3px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 2px;
            margin: 0 auto 1.5rem;
        }

        .bio {
            font-size: 1rem;
            color: #555;
            margin-bottom: 2rem;
            text-align: left;
        }

        .contact {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .contact li {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            background: #f5f7fa;
            border-radius: 10px;
            font-size: 0.95rem;
            transition: background 0.2s;
        }

        .contact li:hover {
            background: #eef0f5;
        }

        .contact .icon {
            width: 20px;
            text-align: center;
            flex-shrink: 0;
        }

        .contact a {
            color: #667eea;
            text-decoration: none;
        }

        .contact a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="avatar">Z</div>
        <h1>张三</h1>
        <p class="tagline">全栈开发工程师</p>
        <div class="divider"></div>
        <p class="bio">
            你好！我是一名热爱技术的全栈开发工程师，拥有丰富的 Web 开发经验。擅长使用 JavaScript、Python 等技术栈构建高质量的应用程序。热衷于开源社区，喜欢探索新技术，追求简洁优雅的代码风格。工作之余，我也喜欢阅读、摄影和旅行。
        </p>
        <ul class="contact">
            <li>
                <span class="icon">&#9993;</span>
                <span>邮箱：<a href="mailto:zhangsan@example.com">zhangsan@example.com</a></span>
            </li>
            <li>
                <span class="icon">&#9742;</span>
                <span>电话：+86 138-0000-0000</span>
            </li>
            <li>
                <span class="icon">&#128279;</span>
                <span>GitHub：<a href="#">github.com/zhangsan</a></span>
            </li>
        </ul>
    </div>
</body>
</html>
