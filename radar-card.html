<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>开店雷达 PRO</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #F2F2F2;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    display: flex;
    justify-content: center;
    min-height: 100vh;
    color: #333;
  }
  .container {
    width: 375px;
    padding: 0 16px 32px;
    background: #F2F2F2;
  }

  /* Nav */
  .nav {
    padding: 16px 0 12px;
  }
  .nav-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .nav-brand {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 18px;
    font-weight: 700;
  }
  .brand-icon {
    width: 32px;
    height: 32px;
    background: #1A1A2E;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .pro-tag {
    background: linear-gradient(135deg, #F5A623, #F7C948);
    color: #fff;
    font-size: 10px;
    font-weight: 700;
    padding: 2px 6px;
    border-radius: 4px;
    letter-spacing: 0.5px;
  }
  .export-btn {
    display: flex;
    align-items: center;
    gap: 4px;
    background: #fff;
    border: 1px solid #E0E0E0;
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 13px;
    color: #333;
    cursor: pointer;
  }
  .nav-subtitle {
    margin-top: 10px;
    font-size: 14px;
    color: #666;
  }
  .nav-tags {
    margin-top: 8px;
    display: flex;
    gap: 6px;
    font-size: 12px;
    color: #999;
  }
  .nav-tags span { display: flex; align-items: center; gap: 4px; }
  .nav-tags .dot { color: #CCC; }

  /* Card base */
  .card {
    background: #fff;
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 12px;
  }

  /* AI Score */
  .score-label {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: #FFF5E6;
    color: #F5A623;
    font-size: 12px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 20px;
  }
  .score-label .dot { font-size: 8px; }
  .score-body {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 16px;
  }
  .score-number {
    font-size: 64px;
    font-weight: 800;
    line-height: 1;
    color: #1A1A1A;
  }
  .score-number .unit {
    font-size: 20px;
    font-weight: 600;
    color: #999;
    margin-left: 2px;
  }
  .ring-wrap {
    width: 80px;
    height: 80px;
    position: relative;
  }
  .ring-wrap svg { transform: rotate(-90deg); }
  .ring-text {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    font-weight: 700;
    color: #1A1A1A;
  }
  .score-summary {
    margin-top: 16px;
    font-size: 14px;
    line-height: 1.6;
    color: #555;
    background: #FAFAFA;
    border-radius: 10px;
    padding: 12px;
    border-left: 3px solid #F5A623;
  }
  .score-footer {
    display: flex;
    margin-top: 16px;
    gap: 12px;
  }
  .score-stat {
    flex: 1;
    background: #FAFAFA;
    border-radius: 10px;
    padding: 12px;
    text-align: center;
  }
  .score-stat .label {
    font-size: 12px;
    color: #999;
  }
  .score-stat .value {
    font-size: 18px;
    font-weight: 700;
    color: #1A1A1A;
    margin-top: 4px;
  }

  /* Heatmap */
  .section-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
  }
  .section-title {
    font-size: 16px;
    font-weight: 700;
    color: #1A1A1A;
  }
  .tag-high {
    background: #FFEBE6;
    color: #FF3B30;
    font-size: 11px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 6px;
  }
  .tag-orange {
    background: #FFF5E6;
    color: #F5A623;
    font-size: 11px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 6px;
  }
  .heatbar-track {
    height: 10px;
    border-radius: 5px;
    background: linear-gradient(to right, #E0E0E0, #F5A623, #FF3B30);
    position: relative;
    margin-bottom: 8px;
  }
  .heatbar-indicator {
    position: absolute;
    top: -4px;
    left: 72%;
    width: 18px;
    height: 18px;
    background: #fff;
    border: 3px solid #FF3B30;
    border-radius: 50%;
    transform: translateX(-50%);
    box-shadow: 0 1px 4px rgba(0,0,0,0.15);
  }
  .heatbar-labels {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: #BBB;
  }

  /* Two column cards */
  .two-col {
    display: flex;
    gap: 12px;
    margin-bottom: 12px;
  }
  .two-col .card {
    flex: 1;
    margin-bottom: 0;
  }
  .mini-title {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 14px;
    font-weight: 700;
    color: #1A1A1A;
    margin-bottom: 14px;
  }
  .mini-icon {
    width: 24px;
    height: 24px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
  }
  .progress-row {
    margin-bottom: 10px;
  }
  .progress-row .row-header {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: #666;
    margin-bottom: 4px;
  }
  .progress-row .row-header .pct {
    font-weight: 700;
    color: #1A1A1A;
  }
  .progress-bar {
    height: 6px;
    background: #F0F0F0;
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    border-radius: 3px;
    background: linear-gradient(to right, #F5A623, #F7C948);
  }
  .compete-count {
    font-size: 22px;
    font-weight: 800;
    color: #1A1A1A;
  }
  .compete-count .sub {
    font-size: 12px;
    font-weight: 400;
    color: #999;
    margin-left: 2px;
  }
  .compete-note {
    font-size: 11px;
    color: #999;
    margin-top: 2px;
    margin-bottom: 10px;
  }
  .compete-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .compete-tags span {
    background: #F5F5F5;
    font-size: 11px;
    color: #666;
    padding: 3px 8px;
    border-radius: 6px;
  }
  .compete-tags span.active {
    background: #FFF5E6;
    color: #F5A623;
    font-weight: 600;
  }

  /* Dark risk module */
  .dark-card {
    background: #1A1A1A;
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 12px;
    color: #fff;
  }
  .dark-card .header {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 14px;
    font-weight: 600;
    color: #F5A623;
    margin-bottom: 14px;
  }
  .dark-body {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 16px;
  }
  .dark-big {
    font-size: 36px;
    font-weight: 800;
    color: #FF3B30;
  }
  .dark-sub {
    font-size: 13px;
    color: #AAA;
  }
  .dark-sub strong {
    color: #FF3B30;
    font-weight: 700;
  }
  .dark-rows {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .dark-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(255,255,255,0.06);
    border-radius: 10px;
    padding: 10px 12px;
    font-size: 13px;
  }
  .dark-row .label { color: #AAA; }
  .dark-row .value { font-weight: 700; color: #fff; }

  /* Risk tips */
  .risk-item {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 10px 0;
    font-size: 13px;
    line-height: 1.5;
  }
  .risk-item + .risk-item {
    border-top: 1px solid #F2F2F2;
  }
  .risk-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
    margin-top: 5px;
  }
  .risk-dot.red { background: #FF3B30; }
  .risk-dot.orange { background: #F5A623; }
  .risk-text.red { color: #FF3B30; font-weight: 600; }
  .risk-text.orange { color: #C48A1A; font-weight: 600; }

  /* CTA */
  .cta-btn {
    display: block;
    width: 100%;
    background: #1A1A1A;
    color: #fff;
    font-size: 16px;
    font-weight: 700;
    text-align: center;
    padding: 16px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    letter-spacing: 0.5px;
  }
  .cta-btn:active { opacity: 0.85; }
</style>
</head>
<body>
<div class="container">

  <!-- 1. Nav -->
  <nav class="nav">
    <div class="nav-top">
      <div class="nav-brand">
        <div class="brand-icon">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- Radar arcs -->
            <path d="M10 2a8 8 0 0 1 8 8" stroke="#fff" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.45"/>
            <path d="M10 4.5a5.5 5.5 0 0 1 5.5 5.5" stroke="#fff" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.7"/>
            <path d="M10 7a3 3 0 0 1 3 3" stroke="#fff" stroke-width="1.5" stroke-linecap="round" fill="none"/>
            <!-- Location pin -->
            <path d="M10 8.2a1.8 1.8 0 1 0 0 3.6 1.8 1.8 0 0 0 0-3.6Z" fill="#fff"/>
            <path d="M10 13.5l-2.2-2.8a3.2 3.2 0 1 1 4.4 0L10 13.5Z" stroke="#fff" stroke-width="1.2" fill="none" stroke-linejoin="round"/>
            <!-- Center dot -->
            <circle cx="10" cy="10" r="0.9" fill="#F5A623"/>
          </svg>
        </div>
        开店雷达 <span class="pro-tag">PRO</span>
      </div>
      <button class="export-btn">↑ 导出</button>
    </div>
    <div class="nav-subtitle">上海松江66广场 | 寿司店</div>
    <div class="nav-tags">
      <span>2026.03.07</span>
      <span class="dot">·</span>
      <span>2km商圈</span>
      <span class="dot">·</span>
      <span>辅助决策版</span>
    </div>
  </nav>

  <!-- 2. AI Score -->
  <div class="card">
    <div class="score-label"><span class="dot">●</span> 建议重点评估</div>
    <div class="score-body">
      <div class="score-number">78<span class="unit">分</span></div>
      <div class="ring-wrap">
        <svg width="80" height="80" viewBox="0 0 80 80">
          <circle cx="40" cy="40" r="34" fill="none" stroke="#F0F0F0" stroke-width="7"/>
          <circle cx="40" cy="40" r="34" fill="none" stroke="#F5A623" stroke-width="7"
            stroke-linecap="round"
            stroke-dasharray="213.6"
            stroke-dashoffset="46.99"/>
        </svg>
        <div class="ring-text">78%</div>
      </div>
    </div>
    <div class="score-summary">
      「社区客群稳定，但同业竞争偏高，建议重点核算租金压力。」
    </div>
    <div class="score-footer">
      <div class="score-stat">
        <div class="label">预计投资</div>
        <div class="value">80-120万</div>
      </div>
      <div class="score-stat">
        <div class="label">预计回本</div>
        <div class="value">14-18个月</div>
      </div>
    </div>
  </div>

  <!-- 3. Heatmap -->
  <div class="card">
    <div class="section-header">
      <div class="section-title">客流热力聚类</div>
      <span class="tag-high">高密度</span>
    </div>
    <div class="heatbar-track">
      <div class="heatbar-indicator"></div>
    </div>
    <div class="heatbar-labels">
      <span>冷清</span>
      <span>活跃</span>
    </div>
  </div>

  <!-- 4. Two columns -->
  <div class="two-col">
    <div class="card">
      <div class="mini-title">
        <div class="mini-icon" style="background:#EEF0FF;color:#5B6BF0;">👥</div>
        商圈画像
      </div>
      <div class="progress-row">
        <div class="row-header">
          <span>25-35岁</span>
          <span class="pct">68%</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" style="width:68%"></div></div>
      </div>
      <div class="progress-row">
        <div class="row-header">
          <span>白领比例</span>
          <span class="pct">82%</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" style="width:82%"></div></div>
      </div>
    </div>
    <div class="card" style="position:relative;">
      <span class="tag-orange" style="position:absolute;top:12px;right:12px;">偏高</span>
      <div class="mini-title">
        <div class="mini-icon" style="background:#FFF5E6;color:#F5A623;">🏪</div>
        竞争情况
      </div>
      <div class="compete-count">12<span class="sub">家</span></div>
      <div class="compete-note">日料为主</div>
      <div class="compete-tags">
        <span>中餐</span>
        <span class="active">日料</span>
        <span>快餐</span>
        <span>西餐</span>
      </div>
    </div>
  </div>

  <!-- 5. Dark risk -->
  <div class="dark-card">
    <div class="header">⚠ 租金敏感度</div>
    <div class="dark-body">
      <div class="dark-big">极高</div>
      <div class="dark-sub">预估租金占比 <strong>22%</strong></div>
    </div>
    <div class="dark-rows">
      <div class="dark-row">
        <span class="label">一楼临街均价</span>
        <span class="value">18-22元/㎡/天</span>
      </div>
      <div class="dark-row">
        <span class="label">推荐坪效目标</span>
        <span class="value">≥3500元/月</span>
      </div>
    </div>
  </div>

  <!-- 6. Risk tips -->
  <div class="card">
    <div class="section-title" style="margin-bottom:12px;">⚠ 风险提示</div>
    <div class="risk-item">
      <div class="risk-dot red"></div>
      <div class="risk-text red">外卖配送动线受限</div>
    </div>
    <div class="risk-item">
      <div class="risk-dot orange"></div>
      <div class="risk-text orange">周末客流落差达40%</div>
    </div>
  </div>

  <!-- 7. CTA -->
  <button class="cta-btn">生成详细评估报告</button>

</div>
</body>
</html>
